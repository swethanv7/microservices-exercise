
server.port=8081
spring.application.name=product-service

spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=microservices_db;encrypt=true;trustServerCertificate=true
spring.datasource.username=swetha
spring.datasource.password=swetha
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Kafka Consumer Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=product-service-group-v2
spring.kafka.consumer.auto-offset-reset=earliest